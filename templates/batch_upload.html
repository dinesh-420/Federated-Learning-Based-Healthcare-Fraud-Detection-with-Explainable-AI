<!DOCTYPE html>
<html>

<head>
    <title>Batch CSV Upload</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

{% include "navbar.html" %}

<div class="container">

<h1>Batch CSV Prediction</h1>

<form action="/batch_upload"
      method="POST"
      enctype="multipart/form-data">

    <input
        type="file"
        name="csv_file"
        accept=".csv"
        required>

    <br><br>

    <button type="submit">
        Upload & Predict
    </button>

</form>

</div>

</body>

</html>
