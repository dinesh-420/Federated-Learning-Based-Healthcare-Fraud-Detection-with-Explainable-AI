<!DOCTYPE html>
<html>

<head>
    <title>Healthcare Fraud Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <h1>Healthcare Fraud Detection System</h1>

    <form action="/predict" method="POST">

     

        <label>Patient Age</label><br>
        <input type="number" name="patient_age"><br><br>

        <label>Gender</label><br>
        <select name="patient_gender">
            <option>Male</option>
            <option>Female</option>
        </select><br><br>

        <label>Hospital Type</label><br>
        <select name="hospital_type">
            <option>Private</option>
            <option>Government</option>
        </select><br><br>

        <label>Treatment Category</label><br>
        <input type="text" name="treatment_category"><br><br>

        <label>Diagnosis Code</label><br>
        <input type="text" name="diagnosis_code"><br><br>

        <label>Claim Amount</label><br>
         <input type="number" name="claim_amount"><br><br>

        <label>Approved Amount</label><br>
        <input type="number" name="approved_amount"><br><br>

        <label>Hospital Stay Days</label><br>
        <input type="number" name="hospital_stay_days"><br><br>

        <label>Previous Claims Count</label><br>
        <input type="number" name="previous_claims_count"><br><br>

        <label>Policy Tenure (Years)</label><br>
         <input type="number" name="policy_tenure_years"><br><br>

        <label>Claim Submission Delay (Days)</label><br>
         <input type="number" name="claim_submission_delay_days"><br><br>

        <label>High Risk Procedure</label><br>
        <select name="high_risk_procedure_flag">
            <option>Yes</option>
            <option>No</option>
        </select><br><br>

        <label>Document Mismatch</label><br>
       <select name="document_mismatch_flag">
            <option>Yes</option>
            <option>No</option>
        </select><br><br>

        <label>Anomaly Score</label><br>
        <input type="number" step="0.01" name="anomaly_score"><br><br>

        <button type="submit">Predict Fraud</button>

    </form>

</body>

</html>
